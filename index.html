<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BharatMonitor — India Civic Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f1c;--panel:#0c1526;--panel2:#101d30;
  --border:#182d48;--border2:#1e3a5f;
  --saffron:#FF7518;--saffron2:#cc5a0e;
  --green:#00c853;--sky:#00b4d8;--gold:#ffd700;
  --red:#ff1744;--teal:#00e5cc;
  --text:#c8d8e8;--muted:#4a6080;--muted2:#2a3f5a;--white:#fff;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
#header{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:200}
.logo{font-family:'Baloo 2',cursive;font-weight:800;font-size:20px;color:var(--white);display:flex;align-items:center;gap:8px}
.logo span{color:var(--saffron)}
.hc{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.ld{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
#liveCount{color:var(--saffron);font-weight:600}
.hright{display:flex;align-items:center;gap:10px}
.btnr{background:var(--saffron);color:var(--white);border:none;border-radius:7px;padding:7px 16px;font-family:'Baloo 2',cursive;font-weight:700;font-size:13px;cursor:pointer;transition:background .15s}
.btnr:hover{background:var(--saffron2)}
/* Feed status indicator */
#feedStatus{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer}
#feedStatus .fsd{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
#feedStatus.live .fsd{background:var(--green);animation:pulse 2s infinite}
#feedStatus.error .fsd{background:var(--red)}
#feedStatus.loading .fsd{background:var(--gold);animation:pulse 1s infinite}
#body{flex:1;display:flex;overflow:hidden}
#map{flex:1;position:relative}
#mStats{position:absolute;top:12px;left:52px;display:flex;gap:8px;z-index:10;pointer-events:none}
.sc{background:rgba(12,21,38,.92);border:1px solid var(--border);border-radius:7px;padding:6px 12px;border-left:2px solid var(--saffron)}
.sc.g{border-left-color:var(--green)}.sc.s{border-left-color:var(--sky)}
.sv{font-family:'Baloo 2',cursive;font-weight:700;font-size:15px;color:var(--saffron);line-height:1}
.sc.g .sv{color:var(--green)}.sc.s .sv{color:var(--sky)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
#mLeg{position:absolute;bottom:28px;left:12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:10px;display:flex;gap:10px;z-index:10;pointer-events:none}
.li{display:flex;align-items:center;gap:5px}.ld2{width:8px;height:8px;border-radius:50%}
#ticker{position:absolute;bottom:0;left:0;right:0;background:rgba(8,15,28,.88);border-top:1px solid var(--border);padding:6px 14px;font-size:11.5px;display:flex;align-items:center;gap:10px;z-index:10}
.tb{background:var(--red);border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;letter-spacing:1.5px;flex-shrink:0;animation:pulse 1.5s infinite}
#tText{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .4s;flex:1}
#tTime{font-size:10px;color:var(--muted);flex-shrink:0;white-space:nowrap}
#sidebar{width:340px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tbn{flex:1;padding:11px 0;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Baloo 2',cursive;font-weight:600;font-size:12px;letter-spacing:.5px;cursor:pointer;text-transform:uppercase;transition:all .15s}
.tbn:hover{color:var(--text)}.tbn.active{color:var(--saffron);border-bottom-color:var(--saffron)}
.tpn{display:none;flex:1;overflow:hidden;flex-direction:column}
.tpn.active{display:flex}
#stInf{background:var(--panel2);border-bottom:1px solid var(--border);padding:14px 16px;display:none;flex-shrink:0}
#stInf.show{display:block}
.stn{font-family:'Baloo 2',cursive;font-weight:700;font-size:17px;color:var(--white);margin-bottom:2px}
.stc{font-family:'Baloo 2',cursive;font-weight:800;font-size:26px;color:var(--saffron);line-height:1}
.sts{font-size:11px;color:var(--muted);margin-bottom:10px}
.cbr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cbl{font-size:11px;width:62px;flex-shrink:0}
.cbt{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.cbf{height:100%;border-radius:2px;transition:width .5s ease}
.cbv{font-size:10px;color:var(--muted);width:38px;text-align:right;flex-shrink:0}
/* Feed data source badges */
.src-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;letter-spacing:.5px}
.src-rss{background:#00B4D820;color:var(--sky);border:1px solid #00B4D840}
.src-citizen{background:#00E5CC20;color:var(--teal);border:1px solid #00E5CC40}
.src-demo{background:#FF751820;color:var(--saffron);border:1px solid #FF751840}
.filt{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.fp{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
.fp.active{background:#FF751815;border-color:var(--saffron);color:var(--saffron)}
.fp[data-cat="water"].active{background:#00B4D815;border-color:var(--sky);color:var(--sky)}
.fp[data-cat="power"].active{background:#FFD70015;border-color:var(--gold);color:var(--gold)}
.fp[data-cat="health"].active{background:#FF174415;border-color:var(--red);color:var(--red)}
.fp[data-cat="corrupt"].active{background:#00E5CC15;border-color:var(--teal);color:var(--teal)}
/* Last updated bar */
#lastUpdated{padding:5px 12px;background:rgba(24,45,72,.6);border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.refresh-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:10px;padding:2px 7px;cursor:pointer;font-family:inherit;transition:all .12s}
.refresh-btn:hover{border-color:var(--saffron);color:var(--saffron)}
#iList{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#iList::-webkit-scrollbar{width:3px}
#iList::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ic{padding:12px 16px;border-bottom:1px solid #0e1c2e;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.ic:hover{background:#0e1c2e}.ic.sel{background:#0f1e34;border-left-color:var(--saffron)}
.ir{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.it{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
.sv2{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.s-emergency{background:#FF174420;color:var(--red);border:1px solid #FF174440}
.s-critical{background:#FF751820;color:var(--saffron);border:1px solid #FF751840}
.s-high{background:#FFD70020;color:var(--gold);border:1px solid #FFD70040}
.s-medium{background:#00B4D820;color:var(--sky);border:1px solid #00B4D840}
.s-low{background:#00E5CC20;color:var(--teal);border:1px solid #00E5CC40}
.im{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;align-items:center}
.iab{margin-top:8px;width:100%;padding:5px;border:1px solid #FF751840;background:#FF751810;border-radius:5px;color:var(--saffron);font-size:11px;cursor:pointer;font-family:inherit;transition:background .1s}
.iab:hover{background:#FF751825}
#aiPnl{padding:14px 16px;font-size:12.5px;line-height:1.8;color:var(--text);overflow-y:auto;flex:1;scrollbar-width:thin}
.ae{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;color:var(--muted);text-align:center;gap:10px}
#rPnl{padding:14px 16px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.fg{margin-bottom:13px}
.fl{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.fi,.fsl,.fta{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:12.5px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus,.fsl:focus,.fta:focus{border-color:var(--saffron)}
.fi::placeholder,.fta::placeholder{color:var(--muted)}
.fsl option{background:var(--panel)}
.fta{min-height:72px;resize:vertical}
.bts{width:100%;padding:10px;background:var(--saffron);color:var(--white);border:none;border-radius:7px;font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;transition:background .15s}
.bts:hover{background:var(--saffron2)}.bts:disabled{background:var(--muted2);cursor:not-allowed}
.sbox{text-align:center;padding:20px 16px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.scel{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:10px}
.scl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.btse{width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:border-color .15s}
.btse:hover{border-color:var(--border2)}
.maplibregl-popup-content{background:var(--panel)!important;border:1px solid var(--border2)!important;border-radius:8px!important;padding:10px 12px!important;color:var(--text)!important;font-family:'DM Sans',sans-serif!important}
.maplibregl-popup-tip{border-top-color:var(--panel)!important}
.maplibregl-ctrl-group{background:var(--panel)!important;border:1px solid var(--border)!important}
.maplibregl-ctrl-group button{background:var(--panel)!important;color:var(--text)!important}
.maplibregl-ctrl-attrib{background:rgba(8,15,28,.7)!important;color:var(--muted)!important;font-size:10px!important}
/* Loading skeleton */
.loading-item{padding:12px 16px;border-bottom:1px solid #0e1c2e}
.skel{background:linear-gradient(90deg,#101d30 25%,#182d48 50%,#101d30 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:12px;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>

  <header id="header">
    <div class="logo">🇮🇳 Bharat<span>Monitor</span></div>

  <div id="body">

        <div class="stc" id="stCount"></div>

        <div id="catBars"></div>
      </div>

        <button class="tbn active" data-tab="feed">Live Feed</button>
        <button class="tbn" data-tab="report">Report</button>
        <button class="tbn" data-tab="ai">AI Analysis</button>
      </div>
      <div class="tpn active" id="panel-feed">

          <button class="fp active" data-cat="all">All</button>

          <button class="fp" data-cat="water">💧 Water</button>
          <button class="fp" data-cat="power">⚡ Power</button>
          <button class="fp" data-cat="health">🏥 Health</button>

        </div>
        <div id="lastUpdated">
          <span id="lastUpdatedText">Fetching live data...</span>
          <button class="refresh-btn" id="btnRefresh">↻ Refresh</button>

      </div>
      <div class="tpn" id="panel-report">
        <div id="rPnl">
          <div id="rForm">
            <div class="fg"><label class="fl">Category</label>
              <select class="fsl" id="rCat">
                <option value="roads">🛣️ Roads & Infrastructure</option>
                <option value="water">💧 Water & Sanitation</option>
                <option value="power">⚡ Electricity & Power</option>
                <option value="health">🏥 Healthcare</option>
                <option value="corrupt">🔍 Corruption / Govt Services</option>
              </select>
            </div>
            <div class="fg"><label class="fl">Issue Title *</label><input class="fi" id="rTitle" placeholder="e.g. Broken road near village school..." maxlength="200"/></div>
            <div class="fg"><label class="fl">State / District *</label><input class="fi" id="rState" placeholder="e.g. Rajasthan, Jaipur" maxlength="100"/></div>
            <div class="fg"><label class="fl">Description *</label><textarea class="fta" id="rDesc" placeholder="Describe the problem — since when, who is affected..." maxlength="600"></textarea></div>
            <button class="bts" id="btnSubmit">Submit Issue →</button>
          </div>
          <div id="rSuccess" style="display:none"></div>
        </div>
      </div>
      <div class="tpn" id="panel-ai">
        <div id="aiPnl">
          <div class="ae">
            <div style="font-size:36px">🤖</div>
            <div style="font-family:'Baloo 2',cursive;font-size:13px">AI Issue Analyst</div>
            <div style="font-size:12px;color:#4a6080;line-height:1.6;max-width:220px">Click any issue in the Live Feed then click "Analyze with AI"</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

var CAT_KEYWORDS = {
  roads:  ['road','highway','pothole','bridge','flyover','nhai','pwd','traffic','nh-','construction','pavement','street','overpass'],
  water:  ['water','sewage','sanitation','drainage','tap','pipeline','contaminated','jal','flood','drain','groundwater','supply'],
  power:  ['electricity','power cut','outage','transformer','voltage','discom','blackout','generator','load shedding','electric','coal'],
  health: ['hospital','doctor','medicine','icu','ambulance','health','medical','aiims','clinic','oxygen','patient','mohfw','vaccine','disease'],
  corrupt:['bribe','corruption','scam','fraud','illegal','ration','complaint','government officer','acb','cbi','lokayukta','embezzle','tender'],
};

var SEV_KEYWORDS = {
  emergency: ['death','died','killed','fatal','collapse','explosion','blast','flood','cyclone','earthquake','oxygen shortage','hospital fire','drowning'],
  critical:  ['contaminated','poisonous','outbreak','epidemic','structural failure','bridge crack','road caved','no water','total blackout','arsenic','cholera'],
  high:      ['pothole','power cut','sewage','bribe','corruption','ration','shortage','delayed','offline','broken','damaged','overflowing'],
  medium:    ['complaint','issue','problem','repair','pending','request','maintenance','delay'],
};

function classify(text) {
  var lower = (text || '').toLowerCase();
  var cat = 'roads', catScore = 0;
  for (var c in CAT_KEYWORDS) {
    var score = CAT_KEYWORDS[c].filter(function(k){ return lower.includes(k); }).length;
    if (score > catScore) { catScore = score; cat = c; }
  }
  var sev = 'medium';
  for (var s in SEV_KEYWORDS) {
    if (SEV_KEYWORDS[s].some(function(k){ return lower.includes(k); })) { sev = s; break; }
  }
  return { cat: cat, sev: sev };
}

function timeAgo(ts) {
  var s = (Date.now() - ts) / 1000;
  if (s < 60)    return Math.floor(s) + 's ago';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function iColor(n) {

function renderIssues() {
  var f = activeFilter === 'all' ? issues : issues.filter(function(i){ return i.cat === activeFilter; });
  var listEl = document.getElementById('iList');

  if (f.length === 0) {
    listEl.innerHTML = '<div style="padding:24px;text-align:center;color:#4a6080;font-size:13px">No issues found for this filter.</div>';
    return;
  }

  var frag = document.createDocumentFragment();
  for (var i = 0; i < f.length; i++) {
    var iss = f[i];
    var sel = iss.id === selectedId;
    var card = document.createElement('div');
    card.className = 'ic' + (sel ? ' sel' : '');
    card.setAttribute('data-id', iss.id);

    // Build inner HTML safely using escapeHtml
    var inner = '<div class="ir">';
    inner += '<div class="it">' + escapeHtml(CI[iss.cat]) + ' ' + escapeHtml(iss.title) + '</div>';
    inner += '<span class="sv2 s-' + escapeHtml(iss.sev) + '">' + escapeHtml(iss.sev) + '</span>';
    inner += '</div>';
    inner += '<div class="im">';
    inner += '<span>📍 ' + escapeHtml(iss.state) + (iss.district ? ', ' + escapeHtml(iss.district) : '') + '</span>';
    inner += '<span>🏛️ ' + escapeHtml(iss.dept) + '</span>';
    inner += '<span>' + escapeHtml(timeAgo(iss.ts)) + '</span>';
    inner += srcBadgeHtml(iss.src);
    if (iss.link) {
      inner += '<a href="' + escapeHtml(iss.link) + '" target="_blank" rel="noopener noreferrer" style="color:var(--sky);font-size:10px;text-decoration:none" onclick="event.stopPropagation()">↗ Source</a>';
    }
    inner += '</div>';
    if (sel) {
      inner += '<button class="iab" data-id="' + escapeHtml(iss.id) + '">🤖 Analyze with AI →</button>';
    }
    card.innerHTML = inner;
    frag.appendChild(card);
  }

  listEl.innerHTML = '';
  listEl.appendChild(frag);

  // Event delegation — one listener on the list
  listEl.onclick = function(e) {
    var btn = e.target.closest('.iab');
    if (btn) {
      e.stopPropagation();
      var id = btn.getAttribute('data-id');
      var found = issues.find(function(x){ return x.id === id; });
      if (found) analyzeIssue(found);
      return;
    }
    var card = e.target.closest('.ic');
    if (!card) return;
    var id = card.getAttribute('data-id');
    selectedId = (selectedId === id) ? null : id;
    renderIssues();
  };
}

// RSS FEED FETCHER
// Real feeds loaded via /api/rss proxy
// ══════════════════════════════════════════
var seenIds = new Set();
var feedCircuitBreaker = {}; // domain → failCount

function extractDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e){ return url; }
}

function fetchFeed(feed) {
  var domain = extractDomain(feed.url);
  // Skip if circuit tripped (3+ failures)
  if ((feedCircuitBreaker[domain] || 0) >= 3) return Promise.resolve(null);

  return fetch('/api/rss?url=' + encodeURIComponent(feed.url))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.ok || !data.items) {
        feedCircuitBreaker[domain] = (feedCircuitBreaker[domain] || 0) + 1;
        return null;
      }
      feedCircuitBreaker[domain] = 0; // reset on success
      feedsLoaded++;
      return processRSSItems(data.items, feed);
    })
    .catch(function() {
      feedCircuitBreaker[domain] = (feedCircuitBreaker[domain] || 0) + 1;
      feedsFailed++;
      return null;
    });
}

function processRSSItems(items, feed) {
  var newIssues = [];
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (!item.title || item.title.length < 10) continue;

    // Deduplicate by title hash
    var key = item.title.slice(0, 60).toLowerCase().replace(/\s+/g, ' ');
    if (seenIds.has(key)) continue;
    seenIds.add(key);

    // Classify
    var cls = classify(item.title + ' ' + (item.description || ''));

    // Parse date
    var ts = item.pubDate ? new Date(item.pubDate).getTime() : Date.now();
    if (isNaN(ts)) ts = Date.now();

    newIssues.push({
      id:       'rss-' + Date.now() + '-' + i,
      title:    item.title,
      state:    inferState(item.title + ' ' + (item.description || '')) || 'India',
      district: '',
      cat:      cls.cat,
      sev:      cls.sev,
      dept:     getDept(cls.cat),
      ts:       ts,
      lat:      null,
      lng:      null,
      src:      'rss',
      link:     item.link || '',
      source:   feed.name,
    });
  }
  return newIssues;
}

  return '';

// ══════════════════════════════════════════
// FETCH ALL FEEDS (parallel with individual circuit breakers)
// ══════════════════════════════════════════
function fetchAllFeeds() {
  setFeedStatus('loading', 'Refreshing feeds...');
  feedsLoaded = 0;
  feedsFailed = 0;

  var promises = FEEDS.map(function(feed){ return fetchFeed(feed); });

  Promise.allSettled(promises).then(function(results) {
    var newIssues = [];
    results.forEach(function(r) {
      if (r.status === 'fulfilled' && Array.isArray(r.value)) {
        newIssues = newIssues.concat(r.value);
      }
    });

    if (newIssues.length > 0) {
      // Merge RSS items — prepend to issues, keep citizens, remove old demo
      var storedReports = issues.filter(function(i){ return i.src === 'citizen'; });
      // Sort RSS by date desc
      newIssues.sort(function(a,b){ return b.ts - a.ts; });
      issues = newIssues.concat(storedReports);
      // Update live counter
      liveCount = Math.max(liveCount, 124832 + newIssues.length);
      document.getElementById('liveCount').textContent = liveCount.toLocaleString('en-IN');
      renderIssues();
      setFeedStatus('live', feedsLoaded + ' feeds live');
    } else {
      // All feeds failed — keep demo data
      if (issues.length === 0) issues = DEMO_ISSUES.slice();
      renderIssues();
      setFeedStatus('error', 'Using demo data — feeds unavailable');
    }

    lastFetchTime = new Date();
    updateLastUpdated();
  });
}

function setFeedStatus(state, text) {
  var el = document.getElementById('feedStatus');
  var txt = document.getElementById('feedStatusText');
  el.className = state;
  txt.textContent = text;
}

function updateLastUpdated() {
  var el = document.getElementById('lastUpdatedText');
  if (!lastFetchTime) { el.textContent = 'Fetching live data...'; return; }
  el.textContent = 'Updated ' + lastFetchTime.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
}

function loadGeoJSON(idx, urls) {
  if (idx >= urls.length) { console.warn('All GeoJSON sources failed'); return; }
  fetch(urls[idx]).then(function(r){ return r.json(); }).then(function(d){ addChoropleth(d); }).catch(function(){ loadGeoJSON(idx+1,urls); });
}

function addChoropleth(geo) {
  if (map.getSource('india')) return;
  map.addSource('india',{type:'geojson',data:geo,promoteId:'NAME_1'});
  var cs = [];
  for (var n in STATES) cs.push(n, iColor(STATES[n].issues));
  var GEO = {'NCT of Delhi':'Delhi','Jammu and Kashmir':'Jammu & Kashmir','Andaman and Nicobar Islands':'Andaman & Nicobar','Pondicherry':'Puducherry','Dadra and Nagar Haveli':'Dadra & Nagar Haveli','Dadra & Nagar Haveli and Daman & Diu':'Dadra & Nagar Haveli'};
  for (var g in GEO) { if (STATES[GEO[g]]) cs.push(g, iColor(STATES[GEO[g]].issues)); }
  map.addLayer({id:'sf',type:'fill',source:'india',paint:{'fill-color':['match',['get','NAME_1']].concat(cs).concat(['#0f2035']),'fill-opacity':['case',['boolean',['feature-state','hover'],false],0.9,0.75]}});
  map.addLayer({id:'sb',type:'line',source:'india',paint:{'line-color':'#1e3a5f','line-width':['case',['boolean',['feature-state','selected'],false],2.5,['boolean',['feature-state','hover'],false],1.5,0.7]}});
  map.addLayer({id:'sh',type:'fill',source:'india',paint:{'fill-color':'#3a6aaa','fill-opacity':['case',['boolean',['feature-state','hover'],false],0.2,0]}});

  var hid=null, sid2=null;
  map.on('mousemove','sf',function(e){
    if(e.features&&e.features.length){
      if(hid) map.setFeatureState({source:'india',id:hid},{hover:false});
      hid=e.features[0].id; map.setFeatureState({source:'india',id:hid},{hover:true});
      map.getCanvas().style.cursor='pointer';
    }
  });
  map.on('mouseleave','sf',function(){
    if(hid){map.setFeatureState({source:'india',id:hid},{hover:false});hid=null;}
    map.getCanvas().style.cursor='';
  });
  map.on('click','sf',function(e){
    if(!e.features||!e.features.length)return;
    var GEO2={'NCT of Delhi':'Delhi','Jammu and Kashmir':'Jammu & Kashmir','Andaman and Nicobar Islands':'Andaman & Nicobar','Pondicherry':'Puducherry','Dadra and Nagar Haveli':'Dadra & Nagar Haveli','Dadra & Nagar Haveli and Daman & Diu':'Dadra & Nagar Haveli'};
    var gn=e.features[0].properties&&e.features[0].properties.NAME_1;
    var name=GEO2[gn]||gn, data=STATES[name];
    if(sid2) map.setFeatureState({source:'india',id:sid2},{selected:false});
    sid2=e.features[0].id; map.setFeatureState({source:'india',id:sid2},{selected:true});
    if(!data)return;
    document.getElementById('stInf').classList.add('show');
    safeText(document.getElementById('stName'), name);
    safeText(document.getElementById('stCount'), data.issues.toLocaleString('en-IN'));
    safeText(document.getElementById('stSub'), 'Active Issues · '+(data.trend.charAt(0)==='+' ? '↑' : '↓')+' '+data.trend+' this week');
    var cats=['roads','water','power','health','corrupt'];
    var max=0; cats.forEach(function(c){ if(data[c]>max)max=data[c]; });
    var bhtml='';
    cats.forEach(function(cat){
      bhtml+='<div class="cbr"><div class="cbl" style="color:'+CC[cat]+'">'+escapeHtml(CI[cat])+' '+escapeHtml(CL[cat])+'</div><div class="cbt"><div class="cbf" style="width:'+Math.round(data[cat]/max*100)+'%;background:'+CC[cat]+'"></div></div><div class="cbv">'+Number(data[cat]).toLocaleString('en-IN')+'</div></div>';
    });
    document.getElementById('catBars').innerHTML=bhtml;
  });
}

}

// AI ANALYSIS — calls /api/analyze (server-side)
// API key is NEVER in the browser
// ══════════════════════════════════════════
function analyzeIssue(iss) {
  switchTab('ai');
  var panel = document.getElementById('aiPnl');
  panel.innerHTML = '<div style="text-align:center;padding:40px;color:#4a6080;font-size:13px;line-height:2">⏳ Analyzing issue with AI...<br><span style="font-size:11px">This takes a few seconds</span></div>';

  fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title:      iss.title,
      state:      iss.state,
      district:   iss.district || '',
      category:   iss.cat,
      severity:   iss.sev,
      department: iss.dept,
      reports:    String(iss.reports || 0),
    }),
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (d.error) { showAIError(panel, d.error); return; }
    var text = d.text || 'Analysis unavailable.';
    renderAnalysis(panel, iss, text);
  })
  .catch(function() {
    showAIError(panel, 'Connection error. Is ANTHROPIC_API_KEY set in Vercel environment variables?');
  });
}

function showAIError(panel, msg) {
  panel.innerHTML = '<div style="color:#4a6080;padding:20px;font-size:13px;line-height:1.8">⚠️ ' + escapeHtml(msg) + '<br><br><div style="font-size:11px;color:#2a3f5a;background:#0c1526;border:1px solid #182d48;border-radius:6px;padding:10px">To enable AI:<br>1. Go to Vercel → Your project → Settings → Environment Variables<br>2. Add <code style="color:#FF7518">ANTHROPIC_API_KEY</code> = your key<br>3. Redeploy</div></div>';
}

function renderAnalysis(panel, iss, text) {
  var HEADERS = ['WHAT IS HAPPENING','WHO IS AFFECTED','WHAT SHOULD BE DONE','RESPONSIBLE AUTHORITY','EXPECTED RESOLUTION'];
  var lines = text.split('\n');
  var html = '<div style="background:#0c1526;border:1px solid #1e3a5f;border-radius:8px;padding:12px;margin-bottom:12px">';
  html += '<div style="font-size:10px;color:#4a6080;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">AI Analysis</div>';
  html += '<div style="font-size:13px;font-weight:500;line-height:1.4">' + escapeHtml(iss.title) + '</div>';
  html += '<div style="font-size:11px;color:#4a6080;margin-top:4px">📍 ' + escapeHtml(iss.state) + ' · ' + escapeHtml(iss.dept) + '</div>';
  html += '</div><div style="font-size:12.5px;line-height:1.9">';
  lines.forEach(function(line) {
    var l = line.trim();
    if (!l) return;
    if (HEADERS.indexOf(l) >= 0) {
      html += '<div style="color:#FF7518;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin:12px 0 4px">' + escapeHtml(l) + '</div>';
    } else if (l.charAt(0) === '•') {
      html += '<div style="padding-left:12px;margin:2px 0">' + escapeHtml(l) + '</div>';
    } else {
      html += '<div style="margin:2px 0">' + escapeHtml(l) + '</div>';
    }
  });
  html += '</div>';
  panel.innerHTML = html;
}

// ══════════════════════════════════════════
// REPORT FORM — calls /api/classify (server-side)
// Persists to localStorage
// ══════════════════════════════════════════
document.getElementById('btnSubmit').addEventListener('click', function() {
  var title = document.getElementById('rTitle').value.trim();
  var desc  = document.getElementById('rDesc').value.trim();
  var state = document.getElementById('rState').value.trim();
  var cat   = document.getElementById('rCat').value;

  if (!title || !desc || !state) { alert('Please fill in all required fields.'); return; }

  // Basic length validation
  if (title.length > 200 || desc.length > 600 || state.length > 100) {
    alert('Input too long. Please shorten your text.'); return;
  }

  var btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = '⏳ Processing...';

  var ticket = 'BW-' + Math.floor(10000 + Math.random() * 90000);

  // Instant keyword classification while waiting for AI
  var kwCls = classify(title + ' ' + desc);

  // Call server-side classify endpoint
  fetch('/api/classify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: title, desc: desc, state: state, category: cat }),
  })
  .then(function(r){ return r.json(); })
  .then(function(r) {
    finishReport(ticket, r.severity || kwCls.sev, r.department || getDept(cat), r.sla_hours || 48, r.message || 'Your report is registered.', title, state, cat, desc);
  })
  .catch(function() {
    // Fallback to keyword classifier
    finishReport(ticket, kwCls.sev, getDept(cat), 48, 'Your report has been received and will be reviewed by the relevant authority.', title, state, cat, desc);
  })
  .finally(function() {
    btn.disabled = false; btn.textContent = 'Submit Issue →';
  });
});

function finishReport(ticket, sev, dept, sla, msg, title, state, cat, desc) {
  var newIssue = {
    id: ticket,
    title: title,
    state: state,
    district: '',
    cat: cat,
    sev: sev,
    dept: dept,
    ts: Date.now(),
    lat: null, lng: null,
    src: 'citizen',
    link: '',
    desc: desc,
  };

  issues.unshift(newIssue);
  saveReports(issues); // Persist to localStorage
  liveCount++;
  document.getElementById('liveCount').textContent = liveCount.toLocaleString('en-IN');
  renderIssues();

  // Show success screen
  document.getElementById('rForm').style.display = 'none';
  var s = document.getElementById('rSuccess');
  s.style.display = 'block';
  s.innerHTML =
    '<div class="sbox">'+
    '<div style="font-size:40px;margin-bottom:8px">✅</div>'+
    '<div style="font-family:\'Baloo 2\',cursive;font-weight:700;font-size:17px;color:#00c853;margin-bottom:4px">Issue Registered!</div>'+
    '<div style="font-family:\'Baloo 2\',cursive;font-weight:800;font-size:22px;color:#ffd700;margin-bottom:10px">' + escapeHtml(ticket) + '</div>'+
    '<div class="sgrid">'+
    '<div class="scel"><div class="scl">Severity</div><span class="sv2 s-' + escapeHtml(sev) + '">' + escapeHtml(sev.toUpperCase()) + '</span></div>'+
    '<div class="scel"><div class="scl">Department</div><div style="font-size:11px;color:#00B4D8;font-weight:600">' + escapeHtml(dept) + '</div></div>'+
    '<div class="scel"><div class="scl">SLA</div><div style="font-size:14px;color:#ffd700;font-weight:700">' + escapeHtml(String(sla)) + 'h</div></div>'+
    '<div class="scel"><div class="scl">Status</div><div style="font-size:13px;color:#00c853;font-weight:600">Active</div></div>'+
    '</div>'+
    '<div style="font-size:12px;color:#4a6080;line-height:1.6;margin-bottom:16px">' + escapeHtml(msg) + '</div>'+
    '<div style="font-size:11px;color:#2a3f5a;margin-bottom:14px">Your report is saved locally and will appear in the Live Feed.</div>'+
    '<button class="btse" id="btnAgain">+ Report Another Issue</button>'+
    '</div>';

  document.getElementById('btnAgain').addEventListener('click', function() {
    document.getElementById('rForm').style.display = 'block';
    s.style.display = 'none';
    ['rTitle','rDesc','rState'].forEach(function(id){ document.getElementById(id).value=''; });
  });
}

function updateTicker() {
  if (!issues.length) return;
  var iss = issues[tickerIdx++ % issues.length];
  var el = document.getElementById('tText');
  var tEl = document.getElementById('tTime');
  el.style.opacity = '0';
  setTimeout(function(){
    el.textContent = CI[iss.cat] + ' ' + iss.state + ' — ' + iss.title;
    tEl.textContent = timeAgo(iss.ts);
    el.style.opacity = '1';
  }, 300);
}
