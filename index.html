*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f1c;--panel:#0c1526;--panel2:#101d30;
  --border:#182d48;--border2:#1e3a5f;
  --saffron:#FF7518;--saffron2:#cc5a0e;
  --green:#00c853;--sky:#00b4d8;--gold:#ffd700;
  --red:#ff1744;--teal:#00e5cc;
  --text:#c8d8e8;--muted:#4a6080;--muted2:#2a3f5a;--white:#fff;

html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
#header{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:200}
.logo{font-family:'Baloo 2',cursive;font-weight:800;font-size:20px;color:var(--white);display:flex;align-items:center;gap:8px}
.logo span{color:var(--saffron)}
.hc{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.ld{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
#liveCount{color:var(--saffron);font-weight:600}
.btnr{background:var(--saffron);color:var(--white);border:none;border-radius:7px;padding:7px 16px;font-family:'Baloo 2',cursive;font-weight:700;font-size:13px;cursor:pointer}
.btnr:hover{background:var(--saffron2)}
#body{flex:1;display:flex;overflow:hidden}
#map{flex:1;position:relative}
#mStats{position:absolute;top:12px;left:52px;display:flex;gap:8px;z-index:10;pointer-events:none}
.sc{background:rgba(12,21,38,.92);border:1px solid var(--border);border-radius:7px;padding:6px 12px;border-left:2px solid var(--saffron)}
.sc.g{border-left-color:var(--green)}.sc.s{border-left-color:var(--sky)}
.sv{font-family:'Baloo 2',cursive;font-weight:700;font-size:15px;color:var(--saffron);line-height:1}
.sc.g .sv{color:var(--green)}.sc.s .sv{color:var(--sky)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
#mLeg{position:absolute;bottom:28px;left:12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:10px;display:flex;gap:10px;z-index:10;pointer-events:none}
.li{display:flex;align-items:center;gap:5px}.ld2{width:8px;height:8px;border-radius:50%}
#ticker{position:absolute;bottom:0;left:0;right:0;background:rgba(8,15,28,.88);border-top:1px solid var(--border);padding:6px 14px;font-size:11.5px;display:flex;align-items:center;gap:10px;z-index:10}
.tb{background:var(--red);border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;letter-spacing:1.5px;flex-shrink:0;animation:pulse 1.5s infinite}
#tText{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .4s}
#sidebar{width:340px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tbn{flex:1;padding:11px 0;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Baloo 2',cursive;font-weight:600;font-size:12px;letter-spacing:.5px;cursor:pointer;text-transform:uppercase}
.tbn.active{color:var(--saffron);border-bottom-color:var(--saffron)}
.tpn{display:none;flex:1;overflow:hidden;flex-direction:column}
.tpn.active{display:flex}
#stInf{background:var(--panel2);border-bottom:1px solid var(--border);padding:14px 16px;display:none;flex-shrink:0}
#stInf.show{display:block}
.stn{font-family:'Baloo 2',cursive;font-weight:700;font-size:17px;color:var(--white);margin-bottom:2px}
.stc{font-family:'Baloo 2',cursive;font-weight:800;font-size:26px;color:var(--saffron);line-height:1}
.sts{font-size:11px;color:var(--muted);margin-bottom:10px}
.cbr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cbl{font-size:11px;width:62px;flex-shrink:0}
.cbt{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.cbf{height:100%;border-radius:2px;transition:width .5s ease}
.cbv{font-size:10px;color:var(--muted);width:38px;text-align:right;flex-shrink:0}
.filt{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.fp{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit}
.fp.active{background:#FF751815;border-color:var(--saffron);color:var(--saffron)}

.fp[data-cat="corrupt"].active{background:#00E5CC15;border-color:var(--teal);color:var(--teal)}

.ic{padding:12px 16px;border-bottom:1px solid #0e1c2e;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.ic:hover{background:#0e1c2e}.ic.sel{background:#0f1e34;border-left-color:var(--saffron)}
.ir{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.it{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
.sv2{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.s-emergency{background:#FF174420;color:var(--red);border:1px solid #FF174440}
.s-critical{background:#FF751820;color:var(--saffron);border:1px solid #FF751840}
.s-high{background:#FFD70020;color:var(--gold);border:1px solid #FFD70040}
.s-medium{background:#00B4D820;color:var(--sky);border:1px solid #00B4D840}
.s-low{background:#00E5CC20;color:var(--teal);border:1px solid #00E5CC40}
.im{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.iab{margin-top:8px;width:100%;padding:5px;border:1px solid #FF751840;background:#FF751810;border-radius:5px;color:var(--saffron);font-size:11px;cursor:pointer;font-family:inherit}
.iab:hover{background:#FF751825}
#aiPnl{padding:14px 16px;font-size:12.5px;line-height:1.8;color:var(--text);overflow-y:auto;flex:1;scrollbar-width:thin}
.ae{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;color:var(--muted);text-align:center;gap:10px}
#rPnl{padding:14px 16px;overflow-y:auto;flex:1;scrollbar-width:thin}
.fg{margin-bottom:13px}
.fl{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.fi,.fsl,.fta{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:12.5px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus,.fsl:focus,.fta:focus{border-color:var(--saffron)}
.fi::placeholder,.fta::placeholder{color:var(--muted)}
.fsl option{background:var(--panel)}
.fta{min-height:72px;resize:vertical}
.bts{width:100%;padding:10px;background:var(--saffron);color:var(--white);border:none;border-radius:7px;font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}

.sbox{text-align:center;padding:20px 16px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.scel{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:10px}
.scl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.btse{width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.maplibregl-popup-content{background:var(--panel)!important;border:1px solid var(--border2)!important;border-radius:8px!important;padding:10px 12px!important;color:var(--text)!important;font-family:'DM Sans',sans-serif!important}

.maplibregl-ctrl-group{background:var(--panel)!important;border:1px solid var(--border)!important}
.maplibregl-ctrl-group button{background:var(--panel)!important;color:var(--text)!important}
.maplibregl-ctrl-attrib{background:rgba(8,15,28,.7)!important;color:var(--muted)!important;font-size:10px!important}
</style>
</head>

// ══════════════════════════════════════════
function timeAgo(ts) {
  var s = (Date.now()-ts)/1000;
  if(s<60) return Math.floor(s)+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function iColor(n) {
  return n>12000?'#7a1520':n>8000?'#a33020':n>5000?'#8a5010':n>2000?'#2a6040':n>500?'#1a4060':'#0f2035';
}
function switchTab(t) {
  document.querySelectorAll('.tbn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-tab')===t); });
  document.querySelectorAll('.tpn').forEach(function(p){ p.classList.toggle('active', p.id==='panel-'+t); });
}

// ══════════════════════════════════════════
// RENDER ISSUE LIST
// ══════════════════════════════════════════
function renderIssues() {
  var f = activeFilter==='all' ? issues : issues.filter(function(i){ return i.cat===activeFilter; });
  var html = '';
  for(var i=0;i<f.length;i++) {
    var iss = f[i];
    var sel = iss.id === selectedId;
    html += '<div class="ic'+(sel?' sel':'')+'" data-id="'+iss.id+'">';
    html += '<div class="ir">';
    html += '<div class="it">'+CI[iss.cat]+' '+iss.title+'</div>';
    html += '<span class="sv2 s-'+iss.sev+'">'+iss.sev+'</span>';
    html += '</div>';
    html += '<div class="im"><span>📍 '+iss.state+(iss.district?', '+iss.district:'')+'</span><span>🏛️ '+iss.dept+'</span><span>'+timeAgo(iss.ts)+'</span></div>';
    if(sel) html += '<button class="iab" data-id="'+iss.id+'">🤖 Analyze with AI →</button>';
    html += '</div>';
  }
  document.getElementById('iList').innerHTML = html;

  var cards = document.getElementById('iList').getElementsByClassName('ic');
  for(var j=0;j<cards.length;j++) {
    (function(card) {
      card.addEventListener('click', function(e) {
        var btn = e.target;
        while(btn && btn !== card) {
          if(btn.classList && btn.classList.contains('iab')) {
            var id = btn.getAttribute('data-id');
            for(var k=0;k<issues.length;k++) {
              if(issues[k].id===id){ analyzeIssue(issues[k]); return; }
            }
          }
          btn = btn.parentNode;
        }
        var id = card.getAttribute('data-id');
        selectedId = (selectedId===id) ? null : id;
        renderIssues();
      });
    })(cards[j]);
  }
}

// ══════════════════════════════════════════
// MAP
// ══════════════════════════════════════════
var map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      carto: {
        type: 'raster',
        tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© CartoDB © OSM',
        maxzoom: 19
      }
    },
    layers: [{ id:'bg', type:'raster', source:'carto' }]
  },
  center: [82.5, 22.5],
  zoom: 4.5,
  minZoom: 3,
  maxZoom: 10,
  attributionControl: false
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}), 'top-left');
map.addControl(new maplibregl.AttributionControl({compact:true}), 'bottom-left');

map.on('load', function() {
  // Use raw.githubusercontent.com with a stable commit for reliability
  var GEO_URL = 'https://raw.githubusercontent.com/Subhash9325/GeoJson-Data-of-Indian-States/master/Indian_States';

  // Fallback: fetch from multiple sources
  var urls = [
    'https://raw.githubusercontent.com/geohacker/india/master/state/india_state.geojson',
    'https://raw.githubusercontent.com/Subhash9325/GeoJson-Data-of-Indian-States/master/Indian_States'
  ];

  loadGeoJSON(0, urls);

  // Add issue markers immediately regardless of GeoJSON
  addMarkers();
});

function loadGeoJSON(idx, urls) {
  if(idx >= urls.length) {
    console.warn('All GeoJSON sources failed, showing markers only');
    return;
  }
  fetch(urls[idx])
    .then(function(r){ return r.json(); })
    .then(function(data){ addChoropleth(data); })
    .catch(function(){ loadGeoJSON(idx+1, urls); });
}

function addChoropleth(geojsonData) {
  if(map.getSource('india')) return;

  map.addSource('india', { type:'geojson', data: geojsonData, promoteId:'NAME_1' });

  var cs = [];
  for(var name in STATES) { cs.push(name, iColor(STATES[name].issues)); }
  var GEO = {'NCT of Delhi':'Delhi','Jammu and Kashmir':'Jammu & Kashmir','Andaman and Nicobar Islands':'Andaman & Nicobar','Dadra and Nagar Haveli':'Dadra & Nagar Haveli','Dadra & Nagar Haveli and Daman & Diu':'Dadra & Nagar Haveli','Pondicherry':'Puducherry'};
  for(var geo in GEO) { var our=GEO[geo]; if(STATES[our]) cs.push(geo, iColor(STATES[our].issues)); }

  map.addLayer({ id:'sf', type:'fill', source:'india', paint:{
    'fill-color': ['match',['get','NAME_1']].concat(cs).concat(['#0f2035']),
    'fill-opacity': ['case',['boolean',['feature-state','hover'],false],0.9,0.75]
  }}, 'bg');
  map.addLayer({ id:'sb', type:'line', source:'india', paint:{
    'line-color':'#1e3a5f',
    'line-width':['case',['boolean',['feature-state','selected'],false],2.5,['boolean',['feature-state','hover'],false],1.5,0.7]
  }});
  map.addLayer({ id:'sh', type:'fill', source:'india', paint:{
    'fill-color':'#3a6aaa',
    'fill-opacity':['case',['boolean',['feature-state','hover'],false],0.2,0]
  }});

  var GEO_FULL = {'NCT of Delhi':'Delhi','Jammu and Kashmir':'Jammu & Kashmir','Andaman and Nicobar Islands':'Andaman & Nicobar','Dadra and Nagar Haveli':'Dadra & Nagar Haveli','Dadra & Nagar Haveli and Daman & Diu':'Dadra & Nagar Haveli','Pondicherry':'Puducherry'};
  var hid = null, sidMap = null;

  map.on('mousemove','sf',function(e){
    if(e.features&&e.features.length){
      if(hid) map.setFeatureState({source:'india',id:hid},{hover:false});
      hid = e.features[0].id;
      map.setFeatureState({source:'india',id:hid},{hover:true});
      map.getCanvas().style.cursor='pointer';
    }
  });
  map.on('mouseleave','sf',function(){
    if(hid){map.setFeatureState({source:'india',id:hid},{hover:false});hid=null;}
    map.getCanvas().style.cursor='';
  });
  map.on('click','sf',function(e){
    if(!e.features||!e.features.length)return;
    var gn = e.features[0].properties && e.features[0].properties.NAME_1;
    var name = GEO_FULL[gn]||gn;
    var data = STATES[name];
    if(sidMap) map.setFeatureState({source:'india',id:sidMap},{selected:false});
    sidMap = e.features[0].id;
    map.setFeatureState({source:'india',id:sidMap},{selected:true});
    if(!data)return;
    document.getElementById('stInf').classList.add('show');
    document.getElementById('stName').textContent = name;
    document.getElementById('stCount').textContent = data.issues.toLocaleString('en-IN');
    document.getElementById('stSub').textContent = 'Active Issues · '+(data.trend.charAt(0)==='+' ? '↑' : '↓')+' '+data.trend+' this week';
    var cats=['roads','water','power','health','corrupt'];
    var max=0; for(var ci=0;ci<cats.length;ci++){if(data[cats[ci]]>max)max=data[cats[ci]];}
    var bhtml='';
    for(var ci=0;ci<cats.length;ci++){
      var cat=cats[ci];
      bhtml+='<div class="cbr"><div class="cbl" style="color:'+CC[cat]+'">'+CI[cat]+' '+CL[cat]+'</div><div class="cbt"><div class="cbf" style="width:'+Math.round(data[cat]/max*100)+'%;background:'+CC[cat]+'"></div></div><div class="cbv">'+data[cat].toLocaleString('en-IN')+'</div></div>';
    }
    document.getElementById('catBars').innerHTML=bhtml;
  });
}

function addMarkers() {
  for(var i=0;i<issues.length;i++){
    (function(iss){
      if(!iss.lat)return;
      var size=iss.sev==='emergency'?14:iss.sev==='critical'?12:iss.sev==='high'?10:8;
      var col=CC[iss.cat];
      var el=document.createElement('div');
      el.style.cssText='width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+col+';border:2px solid '+col+'88;box-shadow:0 0 '+size+'px '+col+'66;cursor:pointer;z-index:5;';
      new maplibregl.Marker({element:el})
        .setLngLat([iss.lng,iss.lat])
        .setPopup(new maplibregl.Popup({offset:12,closeButton:false}).setHTML(
          '<div style="font-size:12px;max-width:200px">'+
          '<div style="color:'+col+';font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:3px">'+CI[iss.cat]+' '+iss.cat+'</div>'+
          '<div style="line-height:1.4">'+iss.title+'</div>'+
          '<div style="color:#4a6080;font-size:10px;margin-top:4px">📍 '+iss.state+'</div></div>'
        ))
        .addTo(map);
    })(issues[i]);
  }
}

// ══════════════════════════════════════════
// AI ANALYSIS
// ══════════════════════════════════════════
function analyzeIssue(iss) {
  switchTab('ai');
  var panel = document.getElementById('aiPnl');
  panel.innerHTML = '<div style="text-align:center;padding:40px;color:#4a6080;font-size:13px">⏳ Analyzing with AI...</div>';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:700,
      messages:[{role:'user',content:'You are BharatMonitor, India civic tracker. Analyze for citizens:\n\nIssue: '+iss.title+'\nState: '+iss.state+(iss.district?', '+iss.district:'')+'\nCategory: '+iss.cat+', Severity: '+iss.sev+', Dept: '+iss.dept+'\n\nUse this format (plain text, no markdown):\n\nWHAT IS HAPPENING\n2 sentences.\n\nWHO IS AFFECTED\n1 sentence.\n\nWHAT SHOULD BE DONE\n• Step 1\n• Step 2\n• Step 3\n\nRESPONSIBLE AUTHORITY\nDept and escalation.\n\nEXPECTED RESOLUTION\nTimeline.\n\nMax 180 words.'}]
    })
  }).then(function(r){return r.json();}).then(function(d){
    var text = '';
    if(d.content) for(var i=0;i<d.content.length;i++) text += d.content[i].text||'';
    if(!text) text='Analysis unavailable.';
    var headers=['WHAT IS HAPPENING','WHO IS AFFECTED','WHAT SHOULD BE DONE','RESPONSIBLE AUTHORITY','EXPECTED RESOLUTION'];
    var lines=text.split('\n');
    var html='<div style="background:#0c1526;border:1px solid #1e3a5f;border-radius:8px;padding:12px;margin-bottom:12px"><div style="font-size:10px;color:#4a6080;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Issue Analysis</div><div style="font-size:13px;font-weight:500;line-height:1.4">'+iss.title+'</div><div style="font-size:11px;color:#4a6080;margin-top:4px">📍 '+iss.state+' · '+iss.dept+'</div></div><div style="font-size:12.5px;line-height:1.9">';
    for(var i=0;i<lines.length;i++){
      var l=lines[i].trim();
      if(headers.indexOf(l)>=0) html+='<div style="color:#FF7518;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin:12px 0 4px">'+l+'</div>';
      else if(l.charAt(0)==='•') html+='<div style="padding-left:12px;margin:2px 0">'+l+'</div>';
      else html+='<div style="margin:2px 0">'+l+'</div>';
    }
    html+='</div>';
    panel.innerHTML=html;
  }).catch(function(){
    panel.innerHTML='<div style="color:#4a6080;padding:20px;font-size:13px;line-height:1.8">⚠️ AI analysis unavailable.<br><br>To enable: Add <strong style="color:#FF7518">ANTHROPIC_API_KEY</strong> in Vercel → Settings → Environment Variables.</div>';
  });
}

// ══════════════════════════════════════════
// REPORT FORM
// ══════════════════════════════════════════
document.getElementById('btnSubmit').addEventListener('click', function(){
  var title=document.getElementById('rTitle').value.trim();
  var desc=document.getElementById('rDesc').value.trim();
  var state=document.getElementById('rState').value.trim();
  var cat=document.getElementById('rCat').value;
  if(!title||!desc||!state){alert('Please fill in all required fields.');return;}
  var btn=document.getElementById('btnSubmit');
  btn.disabled=true; btn.textContent='⏳ Processing...';
  var ticket='BW-'+Math.floor(10000+Math.random()*90000);
  var sev='high',dept='Relevant Authority',sla=48,msg='Your report has been registered and forwarded.';

  function finish(sev,dept,sla,msg){
    issues.unshift({id:ticket,title:title,state:state,cat:cat,sev:sev,dept:dept,ts:Date.now(),district:'',lat:null,lng:null});
    liveCount++;
    document.getElementById('liveCount').textContent=liveCount.toLocaleString('en-IN');
    renderIssues();
    document.getElementById('rForm').style.display='none';
    document.getElementById('rSuccess').style.display='block';
    document.getElementById('rSuccess').innerHTML=
      '<div class="sbox">'+
      '<div style="font-size:40px;margin-bottom:8px">✅</div>'+
      '<div style="font-family:\'Baloo 2\',cursive;font-weight:700;font-size:17px;color:#00c853;margin-bottom:4px">Issue Registered!</div>'+
      '<div style="font-family:\'Baloo 2\',cursive;font-weight:800;font-size:22px;color:#ffd700;margin-bottom:10px">'+ticket+'</div>'+
      '<div class="sgrid">'+
      '<div class="scel"><div class="scl">Severity</div><span class="sv2 s-'+sev+'">'+sev.toUpperCase()+'</span></div>'+
      '<div class="scel"><div class="scl">Department</div><div style="font-size:11px;color:#00B4D8;font-weight:600">'+dept+'</div></div>'+
      '<div class="scel"><div class="scl">SLA</div><div style="font-size:14px;color:#ffd700;font-weight:700">'+sla+'h</div></div>'+
      '<div class="scel"><div class="scl">Status</div><div style="font-size:13px;color:#00c853;font-weight:600">Active</div></div>'+
      '</div>'+
      '<div style="font-size:12px;color:#4a6080;line-height:1.6;margin-bottom:16px">'+msg+'</div>'+
      '<button class="btse" id="btnAgain">+ Report Another Issue</button>'+
      '</div>';
    document.getElementById('btnAgain').addEventListener('click',function(){
      document.getElementById('rForm').style.display='block';
      document.getElementById('rSuccess').style.display='none';
      ['rTitle','rDesc','rState'].forEach(function(id){document.getElementById(id).value='';});
      btn.disabled=false; btn.textContent='Submit Issue →';
    });
  }

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:'Classify this Indian civic issue. Reply ONLY with valid JSON, no other text:\nTitle: '+title+'\nCategory: '+cat+'\nState: '+state+'\nDescription: '+desc+'\n\nJSON format: {"severity":"emergency|critical|high|medium|low","department":"govt dept name","sla_hours":48,"message":"one reassuring sentence to the citizen"}'}]})
  }).then(function(r){return r.json();}).then(function(d){
    try{
      var raw=''; if(d.content) for(var i=0;i<d.content.length;i++) raw+=d.content[i].text||'';
      var r=JSON.parse(raw.replace(/```json|```/g,'').trim());
      finish(r.severity||sev, r.department||dept, r.sla_hours||sla, r.message||msg);
    }catch(e){ finish(sev,dept,sla,msg); }
  }).catch(function(){ finish(sev,dept,sla,msg); });
});
